name: Update ArgoCD e2e versions

# Keeps the e2e matrix on the latest patch of the recent ArgoCD minors. Patch
# bumps and new minor/major lines both land as a PR; the PR is authored by the
# release bot so the E2E workflow runs on it and proves the new versions work
# before anyone merges. Run manually via "Run workflow" to dry-run / prove it.
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Resolve latest ArgoCD versions
        id: resolve
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: node __tests__/e2e/update-argocd-versions.mjs

      - name: Open pull request
        if: steps.resolve.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: chore/bump-argocd-e2e-versions
          commit-message: "ci(e2e): bump ArgoCD test versions (${{ steps.resolve.outputs.bump_type }})"
          title: "ci(e2e): bump ArgoCD test versions (${{ steps.resolve.outputs.bump_type }})"
          labels: dependencies
          body: |
            Automated bump of the ArgoCD versions exercised by the E2E matrix.

            - **Bump type:** ${{ steps.resolve.outputs.bump_type }}
            - **Before:** ${{ steps.resolve.outputs.old_versions }}
            - **After:** ${{ steps.resolve.outputs.new_versions }}

            The E2E workflow runs on this PR against the new versions. A `minor`
            or `major` bump slides the tracked window (adds the newest minor,
            drops the oldest) — give those a closer look before merging.

            Generated by `.github/workflows/update-argocd-versions.yml`.
